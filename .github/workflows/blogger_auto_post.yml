name: Blogger Auto Backlink Post

on:
  schedule:
    # 매시간 정각 실행 (UTC 기준)
    - cron: '0 * * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 google-generativeai

    - name: Run Auto Poster
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BLOGGER_TOKEN_JSON: ${{ secrets.BLOGGER_TOKEN_JSON }}
        BLOGGER_CREDENTIALS_JSON: ${{ secrets.BLOGGER_CREDENTIALS_JSON }}
        BLOGS_JSON_DATA: ${{ secrets.BLOGS_JSON_DATA }}
      run: |
        python scripts/blogger/poster.py
